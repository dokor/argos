services:
  lighthouse-service:
    build:
      context: /srv/apps/lighthouse-service/src
      dockerfile: Dockerfile
    container_name: lighthouse-service
    restart: unless-stopped
    environment:
      - PORT=3017
      - NODE_ENV=production
      # optionnel : limites / timeouts
      - MAX_CONCURRENCY=2
      - NAV_TIMEOUT_MS=45000
    networks:
      - argos_internal

networks:
  argos_internal:
    external: true