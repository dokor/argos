services:
  console-web:
    build:
      context: /srv/apps/console-web/src
      dockerfile: Dockerfile
    image: console-web:local
    container_name: console-web
    restart: unless-stopped
    networks:
      - proxy
    env_file:
      - /srv/configs/console-web/.env.prod
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://argos.lelouet.fr
      - NEXT_PUBLIC_ARGOS_API_BASE=/api
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.console-web.rule=Host(`argos.lelouet.fr`)
      - traefik.http.routers.console-web.entrypoints=websecure
      - traefik.http.routers.console-web.tls=true
      - traefik.http.services.console-web.loadbalancer.server.port=3000
      - traefik.http.routers.console-web.priority=10
      - traefik.http.routers.console-web.tls.certresolver=le

      - traefik.http.routers.console-web-http.rule=Host(`argos.lelouet.fr`)
      - traefik.http.routers.console-web-http.entrypoints=web
      - traefik.http.routers.console-web-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

networks:
  proxy:
    external: true
