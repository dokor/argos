name: Deploy lighthouse-service (Raspberry)

on:
  push:
    branches: ["main"]
    paths:
      - "apps/lighthouse-service/**"
      - "infra/compose/lighthouse-service/**"
      - ".github/workflows/deploy-lighthouse-service.yml"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync lighthouse-service sources to /srv/apps
        run: |
          mkdir -p /srv/apps/lighthouse-service/src
          rsync -a --delete ./apps/lighthouse-service/ /srv/apps/lighthouse-service/src/
          chown -R $USER:$USER /srv/apps/lighthouse-service

      - name: Sync compose to /srv/apps
        run: |
          mkdir -p /srv/apps/lighthouse-service
          rsync -a ./infra/compose/lighthouse-service/docker-compose.prod.yml /srv/apps/lighthouse-service/docker-compose.prod.yml
          chown -R $USER:$USER /srv/apps/lighthouse-service

      - name: Ensure network exists (argos_internal)
        run: |
          docker network inspect argos_internal >/dev/null 2>&1 || docker network create argos_internal

      - name: Deploy (local build)
        run: |
          cd /srv/apps/lighthouse-service
          docker compose -f docker-compose.prod.yml up -d --build --remove-orphans

      - name: Cleanup old images
        run: |
          docker image prune -f